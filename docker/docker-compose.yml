services:
  lichtfeld-studio:
    container_name: lichtfeld-studio
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
      args:
        USER_UID: ${USER_UID}
        USER_GID: ${USER_GID}
        USERNAME: ${USERNAME}
        HOSTNAME: ${HOSTNAME}
        USER_PASSWORD: ${USER_PASSWORD}
        CUDA_VERSION: ${CUDA_VERSION}
    image: lichtfeld-studio:latest
    network_mode: "host"
    working_dir: /home/${USERNAME}/projects/LichtFeld-Studio
    ipc: host
    pid: host
    privileged: true
    user: "${USERNAME}:${USER_GID}"
    hostname: ${HOSTNAME}
    stdin_open: true
    tty: true
    environment:
      - USER_UID=${USER_UID}
      - USER_GID=${USER_GID}
      - USERNAME=${USERNAME}
      - DISPLAY=unix${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - ../:/home/${USERNAME}/projects/LichtFeld-Studio
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/home/${USERNAME}/.Xauthority:rw
      - ${HOME}/.ssh:/home/${USERNAME}/.ssh:ro
      - ${HOME}/.lichtfeld:/home/${USERNAME}/.lichtfeld:rw
    gpus: all
